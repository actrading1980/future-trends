mer quantum wafer foundry puro del mundo ($1B cash + IP + personal). US DoC asignó $100M vía CHIPS Act a Rigetti Computing (**RGTI**). Fuentes: IBM Newsroom, HPCwire, semana del 2-16 jun 2026.\n- **Por qué importa:** $10B es el mayor compromiso de capital privado individual en quantum hasta la fecha. Anderon como foundry externo abre la posibilidad de que terceros fabriquen QPUs en infraestructura IBM — un modelo análogo al de TSMC (**TSM**) pero 5-10 años antes de relevancia competitiva. El CHIPS Act a Rigetti señala que el gobierno EE.UU. diversifica apuestas más allá de IBM y Google.\n- **Implicación de inversión:** IBM consolida liderazgo quantum enterprise (340+ organizaciones con workloads reales). IONQ y RGTI son beneficiarios especulativos del rally sectorial (ambas +50% desde marzo 2026). El horizonte de fault tolerance (2029-2033) supera el rango de predicción de 3-18 meses.\n- **Qué vigilar:** Primeros clientes de Anderon foundry (esperado H1 2027). Nuevos benchmarks IBM de \"utility-scale\" quantum en Q3 2026. Hitos del CHIPS Act $100M de Rigetti (milestone 1: 6 meses desde asignación).\n\n---\n\n**[Moderna-Merck mRNA Cancer Vaccine: 5-year data + Phase 3 enrollada]**\n- **Qué pasó:** Moderna y Merck presentaron en ASCO datos de 5 años de intismeran autogene + Keytruda en melanoma: 49% reducción de riesgo de recurrencia o muerte sostenida a 5 años. Phase 3 completamente enrolada (~1,000 pacientes), resultados esperados H2 2026. Fuentes: Merck.com, FierceBiotech, BioSpace/ASCO, junio 2026.\n- **Por qué importa:** La durabilidad a 5 años es el dato crítico que el mercado necesitaba: la respuesta inmune por mRNA personalizado es estable en el tiempo. Si Phase 3 replica el resultado, intismeran sería el primer tratamiento oncológico verdaderamente personalizado con mRNA aprobable. La plataforma escala a 7 trials adicionales (pulmón, colon, etc.).\n- **Implicación de inversión:** MRNA es el beneficiario principal con potencial de rerating significativo si Phase 3 es positivo (TAM >$20B en oncología personalizada). RXRX se beneficia indirectamente (AI para identificación de neoantigenos). LLY sin exposición directa, permanece neutral.\n- **Qué vigilar:** Resultado Phase 3 de intismeran (H2 2026 — evento principal del año para MRNA). Lectura de Phase 2 en NSCLC (cáncer de pulmón, esperada Q1 2027). Anuncio de BLA si datos son positivos.\n\n---\n\n**[Battery Storage Record: 9.7 GWh Q1 2026 + 86 GW Pipeline Anual]**\n- **Qué pasó:** SEIA reportó 9.7 GWh de battery storage instalados en Q1 2026, máximo histórico (+32% interanual). Pipeline anual de 24 GW utility-scale storage (+60% vs 2025). Globalmente: BloombergNEF reporta costos de battery storage en mínimos históricos. Fuentes: Utility Dive/SEIA, BloombergNEF, pv-magazine, abril-junio 2026.\n- **Por qué importa:** El mercado de storage alcanza masa crítica: costos LFP en mínimos + IRA incentivos + demanda de data centers en baseload continuo crean ciclo auto-sostenido. Las utilities pre-posicionan capacity de storage ante la explosión de demanda de AI data centers que consumen power 24/7.\n- **Implicación de inversión:** ENPH (home battery + microinverter) y FSLR (utility-scale thin-film, 100% US manufacturing) son los más expuestos positivamente. TSLA Megapack es el catalizador infravaluado de la acción vs narrativa FSD/Optimus. Riesgo: aranceles sobre celdas LFP de origen chino aún en litigio.\n- **Qué vigilar:** Decisión arancelaria sobre LFP chino (Q3-Q4 2026). TSLA Megapack backlog en Q2 earnings (julio). Expansión de fab de FSLR en Ohio: anuncio de aumento de capacidad sería señal de demanda robusta.\n\n---\n\n## 3. Tendencias emergentes nuevas detectadas hoy\n\n**Intel Foundry como competidor real de TSMC (**TSM**) en nodos avanzados:** La entrada en risk production de 18A-P es la primera señal operativa —no solo anuncios— de que Intel Foundry puede ejecutar procesos de frontera. La narrativa pasa de \"Intel vs TSMC (**TSM**) en 2030\" a potencialmente \"Intel com

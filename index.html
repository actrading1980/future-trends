    document.getElementById('content').innerHTML = marked.parse("Tengo suficientes datos de las 5 categorías. Compilando el informe completo ahora.\n\n---\n\n```\nVALIDATION_STATUS: UNVALIDATED\nLos scores en este informe no han superado el gate estadístico de Phase 2.\nNo usar para decisiones de tamaño de posición.\n```\n\n---\n\n# FutureAnalysis Daily Report — 2026-06-08\n\n---\n\n## 1. Executive Summary\n\nJornada dominada por cinco tendencias con catalizadores materiales verificables. El evento más significativo es la captación de capital de Alphabet por $84.75B (upsizada de $80B) para infraestructura de IA, que señala el inicio de la fase de capex extremo y beneficia a toda la cadena de semiconductores. IBM ancló la narrativa cuántica con un compromiso de $10B+ el 2 de junio, incluyendo la primera fundición de obleas cuánticas del mundo. El coste de almacenamiento de baterías cayó a mínimos históricos según BNEF, acelerando el despliegue de energías limpias. El universo se mantiene predominantemente BULLISH; WOLF es el único valor con score BEARISH dada su crisis financiera estructural.\n\n---\n\n## 2. Desarrollos clave del día\n\n**[Alphabet eleva captación de capital a $84.75B para infraestructura de IA]**\n- **Qué pasó:** El 1 de junio, Alphabet anunció una oferta de capital de $80B estructurada en $15B en acciones preferentes convertibles obligatorias, $15B en acciones ordinarias Clase A/C, un programa ATM de $40B que iniciará en Q3 2026, y un placement privado de $10B con Berkshire Hathaway. El 2 de junio, la operación se upsizó a $84.75B total. Las CapEx 2026 de Alphabet se proyectan en $180-190B, con un incremento adicional \"significativo\" en 2027.\n- **Por qué importa:** Es la mayor captación de capital de un solo emisor tech en la historia moderna. La escala del capex implica demanda sostenida de chips H100/B200/GB200 (NVDA), servidores de IA (SMCI), racks de cómputo (AVGO/MRVL), y capacidad de foundry en TSMC (**TSM**). Berkshire Hathaway como comprador a $10B valida la tesis de GOOGL como utilidad de cómputo, no solo empresa de publicidad.\n- **Implicación de inversión:** Directamente alcista para NVDA, TSM, AVGO, SMCI, MRVL y ORCL (que hospeda GPU clusters para terceros). Para GOOGL/GOOG, el dilución a corto plazo está más que compensada por la señal de confianza de Berkshire y la posición dominante en infraestructura de IA.\n- **Qué vigilar:** Inicio del programa ATM en Q3 2026 (julio-septiembre); cualquier guidance de CapEx actualizado en el earnings de Q2 (esperado ~julio 29). Si las CapEx exceden $190B, los proveedores de infraestructura tendrían upside adicional.\n\n---\n\n**[IBM compromete >$10B en Quantum Computing y funda primera fundición de obleas cuánticas]**\n- **Qué pasó:** El 2 de junio, IBM anunció una inversión de más de $10B en computación cuántica durante los próximos 5 años, abarcando I+D, capex, manufactura, partnerships y M&A. Simultáneamente, IBM reveló la creación de Anderon — la primera fundición de obleas cuánticas pura del mundo — con $1B de inversión en efectivo de IBM, con apoyo del Departamento de Comercio de EEUU. El objetivo es entregar en 2029 el primer ordenador cuántico tolerante a fallos a gran escala (\"IBM Quantum Starling\"), capaz de ejecutar 20,000x más operaciones que los sistemas actuales.\n- **Por qué importa:** El compromiso de $10B en un segmento de ingresos hoy marginal señala que IBM ve la ventana de monetización cuántica abrirse entre 2026-2029. La creación de una foundry de obleas cuánticas es disruptiva para el ecosistema: crea infraestructura de manufactura que actualmente no existe como servicio, lo que podría beneficiar a startups como IonQ y Rigetti que hoy fabrican sus propios chips con altísimo coste.\n- **Implicación de inversión:** IBM (IBM) es directamente alcista — el anuncio consolida su posición como líder cuántico corporativo. Para IONQ y RGTI, la noticia es ambigua: valida el sector (alcista) pero podría crear competencia de manufactura (riesgo). MSFT (Azure Quantum) se beneficia indirectamente del crecimiento del ecosistema.\n- **Qué vigilar:** Primer resultado de \"quantum advantage\" demostrado por un cliente de IBM en 2026 (IBM lo proyecta para antes de fin de año). Anuncio de socios industriales para Anderon en H2 2026.\n\n---\n\n**[TSMC (**TSM**) 2nm sold out para 2026; NVIDIA-TSMC (**TSM**) lanzan IA dentro de las fabs]**\n- **Qué pasó:** TSMC (**TSM**) confirmó que su proceso N2 está a plena capacidad de 90,000-100,000 obleas/mes en Fab 22 (Kaohsiung) y Fab 20 (Hsinchu), completamente vendido para 2026. Los precios de oblea N2 superan los $30,000 — casi el doble que N4. Simultáneamente, NVIDIA y TSMC (**TSM**) anunciaron que TSMC (**TSM**) está usando NVIDIA Metropolis, TAO Toolkit y CUDA-X dentro de sus fabs para inspección de defectos con visión IA, acelerando litografía, simulación y control de procesos. COMPUTEX 2026 (celebrado en Taipei) reunió a Jensen Huang y Lisa Su para solidificar la cadena de suministro de IA.\n- **Por qué importa:** TSMC (**TSM**) siendo el único fabricante en volumen en 2nm crea un cuello de botella estructural que da a la empresa poder de precios extraordinario. Al integrar IA de NVIDIA en sus propios procesos, TSMC (**TSM**) mejora el yield y la velocidad, lo que aumenta sus márgenes. Para los competidores (Intel, Samsung), la brecha tecnológica se amplía.\n- **Implicación de inversión:** TSM tiene doble beneficio: pricing power en N2 (revenue/oblea casi duplicado) y mejora de yield operacional. NVDA tiene exposición directa porque sus chips más avanzados (Blackwell Ultra, Rubin) dependen exclusivamente de TSMC (**TSM**) N2/N3. AMD también se beneficia como cliente clave de N2/N3.\n- **Qué vigilar:** Anuncio de inicio de instalación de equipos en segunda fábrica en Arizona (Q3 2026, julio-septiembre). Precio de oblea N1.6 cuando TSMC (**TSM**) lo revele (estimado $40,000+).\n\n---\n\n**[Costes de almacenamiento de baterías alcanzan mínimos históricos; despliegue Q1 2026 sube 48%]**\n- **Qué pasó:** BloombergNEF reportó que el coste global benchmark de un sistema de baterías de 4 horas cayó 27% interanual a $78/MWh en 2025, mínimo histórico desde que BNEF comenzó a medir en 2009. Los packs de litio-ion cayeron a $108/kWh. En Q1 2026, las instalaciones de almacenamiento de baterías en EEUU alcanzaron 2.4 GW, un 48% por encima del máximo anterior de Q1. El pipeline creció 17% trimestral a 53.8 GW récord. EEUU prevé 86 GW de nueva capacidad utility-scale en 2026, de los cuales 26.3 GW serán baterías — la mayor expansión anual en más de dos décadas. Además, Illinois firmó legislación de energía limpia que activará inversiones en solar, baterías y VPPs.\n- **Por qué importa:** El punto de cruce económico donde las baterías son competitivas con gas de peaking ya ha llegado en múltiples mercados. Proyectos co-located de solar + storage entregan energía a $57/MWh promedio, por debajo del coste de producción de muchas plantas de gas existentes. Esto crea un ciclo virtuoso de despliegue acelerado.\n- **Implicación de inversión:** ENPH y FSLR son beneficiarios directos en el universo. TSLA (Megapack) tiene exposición significativa al almacenamiento utility-scale, que compite mejor que nunca. El riesgo de commoditización presiona márgenes de fabricantes de bajo coste, pero los líderes de tecnología (FSLR con telururo de cadmio) mantienen ventaja diferenciada.\n- **Qué vigilar:** Guidance de unidades de Megapack de TSLA en Q2 earnings (~julio). Inicio de construcción del proyecto de almacenamiento de 100 contenedores en Northeast Ohio (junio 2026). Datos de Q2 deployment de ENPH.\n\n---\n\n**[CRISPR avanza en múltiples frentes clínicos y tecnológicos]**\n- **Qué pasó:** La FDA otorgó a Beam Therapeutics (**BEAM**) designación RMAT (Regenerative Medicine Advanced Therapy) para BEAM-302 en deficiencia de alfa-1 antitripsina (AATD), habilitando revisión acelerada. NIH publicó un breakthrough que miniaturiza CRISPR para entrega de precisión dentro del cuerpo. Investigadores de HKUST desarrollaron el primer sistema CRISPR guiado por DNA capaz de targeting y clivaje programable de RNA. El mercado CRISPR muestra CAGR 33.5%, y la terapia génica global (valuada en $11B en 2025) se proyecta a $55B para 2034.\n- **Por qué importa:** La designación RMAT de BEAM-302 crea un camino acelerado hacia aprobación que reduce el tiempo de monetización en 2-4 años. La miniaturización de CRISPR resuelve uno de los obstáculos más críticos para la terapia in vivo (entrega sistémica). El CRISPR guiado por DNA abre nuevas aplicaciones diagnósticas y antivirales.\n- **Implicación de inversión:** BEAM es el beneficiario más directo (RMAT = aceleración regulatoria + validación clínica). CRSP tiene la mayor capitalización del sector y pipeline más diverso. RXRX se beneficia indirectamente porque mejores herramientas de edición aceleran su plataforma de descubrimiento.\n- **Qué vigilar:** Fecha de revisión de BEAM-302 por FDA bajo RMAT (estimado H2 2026 para datos de Fase 2). Datos de eficacia de CTX001/exa-cel de CRSP en sickle cell disease en follow-up a largo plazo.\n\n---\n\n## 3. Tendencias emergentes nuevas detectadas hoy\n\n**T1 — AI Infrastructure Supercycle 2026:** La escala de captación de capital de Alphabet ($84.75B) eleva el CapEx de sector a un nivel sin precedentes (~$500B+/año proyectado para la industria), creando una demanda estructural que excede la capacidad de manufactura de semis avanzados. No es una extensión de tendencia existente — es un salto cualitativo de escala.\n\n**T2 — Quantum Wafer Foundry como infraestructura:** La creación de Anderon por IBM inaugura un modelo de negocio nuevo: la manufactura de obleas cuánticas como servicio. Podría transformar el ecosistema de la misma manera que las foundries transformaron los semiconductores en los 90s.\n\n**T3 — Solar+Storage como clase de activo competitiva:** Con $57/MWh para co-located solar+storage, la energía renovable+almacenamiento ha cruzado el umbral de competitividad con gas en la mayoría de mercados EEUU. Esta es una inflexión económica, no solo un avance técnico.\n\n---\n\n## 4. Empresas con score provisional > 70 (BULLISH)\n\n```\nNVDA | NVIDIA Corporation | Sc.:85 | T1(85): AI Infra Supercycle + T2(85): Semis 2nm | Int.: +3 (CORE)\n```\n- **Tesis:** NVIDIA es el proveedor irreemplazable del hardware de cómputo que Alphabet, Microsoft, Amazon y Meta están comprando a escala masiva. La captación de $84.75B de Alphabet traduce directamente en pedidos de GPU GB200/Rubin, que sólo pueden fabricarse en TSMC (**TSM**) N2/N3 donde NVIDIA tiene posición preferencial. La partnership con TSMC (**TSM**) para IA dentro de fabs profundiza la integración vertical y crea barreras adicionales para AMD.\n- **Riesgo principal:** Concentración de clientes — si los hyperscalers reducen capex simultáneamente (recesión, regulación antimonopolio), la demanda cae en cascada. También, AMD MI400 podría ganar cuota en workloads de inferencia donde la diferenciación de CUDA es menor.\n- **Próximo catalizador:** Earnings Q2 FY2027 (agosto 2026, estimado ~28 agosto) con datos de revenue de data center post-Alphabet raise. Anuncio de Rubin architecture en COMPUTEX 2026.\n\n```\nTSM | TSMC | Sc.:84 | T2(84): Semis 2nm Monopolio | Int.: +3 (CORE)\n```\n- **Tesis:** Con 2nm completamente vendido para 2026 a >$30,000/oblea y siendo el único fabricante en volumen, TSMC (**TSM**) tiene el mayor pricing power de su historia. La integración de NVIDIA AI en sus fabs mejora yield, lo que aumenta márgenes de forma estructural. El inicio de instalación de equipos en Arizona Fab 2 (Q3 2026) para producción 3nm en 2027 añade un driver adicional de largo plazo.\n- **Riesgo principal:** Concentración geopolítica — el 90% de la producción avanzada está en Taiwán. Una escalada militar en el estrecho de Taiwán sería un evento de riesgo existencial. Riesgo secundario: Samsung o Intel logran ganar yield en nodos competitivos antes de lo esperado.\n- **Próximo catalizador:** Earnings Q2 2026 de TSMC (**TSM**) (~julio 17) con guidance de revenue/oblea N2 y capacidad de N1.6.\n\n```\nAMD | Advanced Micro Devices | Sc.:82 | T1(76): AI Infra Supercycle + T2(82): Semis 2nm | Int.: +3 (CORE)\n```\n- **Tesis:** AMD anunció $10B+ en inversión para expandir capacidad de packaging avanzado para IA. Sus GPUs MI300X/MI400 ganan cuota en inferencia frente a NVDA, especialmente en open-source LLMs. COMPUTEX 2026 con Lisa Su consolida alianzas con la cadena de suministro taiwanesa. El chiplet design de AMD (arquitectura que NVDA ahora replica) es la arquitectura dominante para semis avanzados.\n- **Riesgo principal:** CUDA moat de NVDA en training es muy difícil de desplazar. AMD depende de TSMC (**TSM**) igual que NVDA, sin acceso exclusivo a capacidad N2.\n- **Próximo catalizador:** Anuncio de MI400 (Instinct) en COMPUTEX 2026. Earnings Q2 (~julio 29) con desglose de revenue de data center GPU.\n\n```\nASML | ASML Holding | Sc.:81 | T2(81): Semis 2nm Monopolio | Int.: +3 (CORE)\n```\n- **Tesis:** ASML es el único fabricante de lithografía High-NA EUV, la herramienta indispensable para producción en 2nm y más finos. Con TSMC (**TSM**) 2nm sold out y planificando N1.6, ASML tiene backlog garantizado por años. A $30,000+ por oblea N2, la productividad del capital de litografía justifica el precio de las máquinas EUV (>$380M cada una). El monopolio de facto en High-NA EUV no tiene sustituto visible en 5+ años.\n- **Riesgo principal:** Control de exportaciones — ASML está prohibida de vender EUV a China, lo que reduce TAM potencial. Si EEUU amplía restricciones, también podría afectar ventas de DUV. Ciclo de capex semis podría suavizarse en 2027-28.\n- **Próximo catalizador:** Earnings Q2 2026 (~julio 16) con datos de backlog EUV y número de unidades High-NA enviadas.\n\n```\nIBM | IBM Corporation | Sc.:79 | T3(79): Quantum Commercial Momentum | Int.: +3 (CORE)\n```\n- **Tesis:** El compromiso de $10B+ convierte a IBM en el único jugador con hoja de ruta cuántica financiada hasta la tolerancia a fallos (2029). La creación de Anderon como foundry independiente monetiza el IP cuántico de IBM sin diluir su negocio híbrido cloud/AI. IBM ya tiene más de 500 clientes usando sus sistemas cuánticos cloud. La demo de quantum advantage con socios (Cleveland Clinic, RIKEN) en proteína de 12,635 átomos es el hito técnico más relevante de la semana.\n- **Riesgo principal:** El gap entre \"quantum advantage en problemas específicos\" y \"quantum advantage comercialmente útil\" podría ser más largo de lo proyectado. Watsonx (AI clásica) podría canibalizar el pipeline de ventas cuántico si los clientes resuelven sus problemas con IA convencional primero.\n- **Próximo catalizador:** Demostración pública de quantum advantage por un cliente IBM antes de fin de 2026 (compromiso explícito). Earnings Q2 IBM (~julio 22) con métricas de revenue cuántico.\n\n```\nBEAM | Beam Therapeutics | Sc.:79 | T5(79): CRISPR/Gene Editing Expansion | Int.: +3 (CORE)\n```\n- **Tesis:** La designación RMAT para BEAM-302 (AATD) crea un camino acelerado hacia aprobación que ningún competidor de base editing tiene hoy. Con >25 pacientes dosificados en hATTR sin eventos adversos severos y elevaciones enzimáticas leves/transitorias, el perfil de seguridad es sólido. Beam posee la tecnología de base editing más avanzada, que permite correcciones genéticas sin cortar el DNA (reduciendo el riesgo de ediciones off-target vs CRISPR clásico).\n- **Riesgo principal:** Financiamiento — las biotechs de gene editing son capital-intensivas y el mercado VC para biotech está más ajustado. Un fracaso clínico en Fase 2 podría colapsar la cotización dada la alta concentración en pocos activos.\n- **Próximo catalizador:** Datos de Fase 2 de BEAM-302 esperados H2 2026. Cualquier anuncio de partnership de manufactura o licencia ampliaría el runway.\n\n```\nIONQ | IonQ Inc. | Sc.:77 | T3(77): Quantum Commercial Momentum | Int.: +3 (CORE)\n```\n- **Tesis:** IonQ usa iones atrapados (vs superconductores de IBM/Google), con mayor coherencia y menor tasa de errores en sistemas pequeños. El ecosistema IBM expandiéndose (más clientes, más capital) valida el sector y puede acelerar contratos cloud para IonQ. La creación de Anderon por IBM podría beneficiar a IonQ si se convierte en cliente de manufactura de chips de iones.\n- **Riesgo principal:** Las empresas de hardware cuántico puro son high-risk/high-reward. IBM y Google tienen recursos para outspend a IonQ infinitamente. El segmento trapped-ion compite con superconductores en escalabilidad a largo plazo.\n- **Próximo catalizador:** Anuncio de contratos cloud con hyperscalers (AWS Braket, Azure Quantum) en H2 2026. Presentación de roadmap de qubits en IEEE Quantum Week (octubre 2026).\n\n```\nAVGO | Broadcom Inc. | Sc.:75 | T1(75): AI Infra Supercycle | Int.: +2 (HIGH)\n```\n- **Tesis:** Los XPU custom de Broadcom (para Google TPU, Meta MTIA) son el mayor competidor estructural a la GPU de NVIDIA en inferencia a escala hyperscaler. Con Alphabet inyectando $84.75B en infraestructura, el TAM de XPU custom crece proporcionalmente. El segmento networking AI (switches Tomahawk, Jericho) también captura el crecimiento de interconexión de GPU clusters.\n- **Riesgo principal:** Alta concentración de ingresos en Google y Meta. Si un hyperscaler reduce su programa de chip custom o lo internaliza completamente, el impacto en AVGO sería material.\n- **Próximo catalizador:** Earnings Q3 FY2026 (~septiembre 2026) con desglose de AI revenue y update del pipeline XPU de nuevos clientes.\n\n```\nRGTI | Rigetti Computing | Sc.:74 | T3(74): Quantum Commercial Momentum | Int.: +3 (CORE)\n```\n- **Tesis:** Rigetti usa superconductores como IBM, pero con fabricación en su propia foundry (Fab-1 en Fremont). El momentum del sector cuántico (IBM $10B, Quobly €115M) valida el espacio y puede impulsar re-rating. Rigetti ha mejorado coherencia en sus chips de 84 qubits y tiene partnerships con Fermilab y DARPA.\n- **Riesgo principal:** Rigetti es una pequeña cap con runway financiero limitado. IBM tiene 100x los recursos. El riesgo de dilución vía secondary offerings es alto.\n- **Próximo catalizador:** Resultados de demos técnicas en Q3 2026. Posible anuncio de contrato gubernamental dado el apoyo del DoE a quantum.\n\n```\nARM | Arm Holdings | Sc.:74 | T2(74): Semis Avanzados / AI Chip Architecture | Int.: +2 (HIGH)\n```\n- **Tesis:** Prácticamente todos los chips de IA en edge y móvil (Apple Silicon, Qualcomm Snapdragon, chips custom de AWS Graviton, Google Axion) se basan en arquitectura ARM. Con el crecimiento de IA edge e inferencia en dispositivos, el royalty stream de ARM crece independientemente de quién fabrique el chip. El acceso de NVIDIA y AMD a architecturas CSS (Custom Silicon Solutions) de ARM profundiza la integración.\n- **Riesgo principal:** RISC-V emergente como alternativa open-source. Si los hyperscalers migran a RISC-V en workloads commodity, ARM pierde royalties en ese segmento.\n- **Próximo catalizador:** Earnings Q1 FY2027 (~agosto 2026) con métricas de royalties por chip AI.\n\n```\nAMAT | Applied Materials | Sc.:73 | T2(73): Semis Advanced Nodes | Int.: +2 (HIGH)\n```\n- **Tesis:** Applied Materials (**AMAT**) provee equipos de deposición y etching necesarios para fabricar chips en nodos avanzados. Con TSMC (**TSM**) 2nm sold out y planes de N1.6, el backlog de AMAT es multi-año. El gate-all-around transistor (GAA), necesario para 2nm y más fino, requiere herramientas de deposición atómica (ALD) donde AMAT tiene liderazgo técnico.\n- **Riesgo principal:** El ciclo de equipos semis puede volverse sobre-inventariado si el capex de TSMC (**TSM**)/Samsung se desacelera post-2027. Competencia de Lam Research (**LRCX**) y Tokyo Electron en segmentos adyacentes.\n- **Próximo catalizador:** Earnings Q3 FY2026 (~agosto 2026). Guidance de bookings para H2 2026.\n\n```\nMSFT | Microsoft Corporation | Sc.:73 | T1(73): AI Infra Supercycle + T3(70): Quantum | Int.: +2 (HIGH)\n```\n- **Tesis:** Azure es el beneficiario directo de la carrera de capex de IA — cada dólar que un enterprise gasta en IA en cloud tiende a pasar por Azure (OpenAI exclusivity, Copilot suite, GitHub Copilot). La inversión IBM en quantum complementa Azure Quantum, donde MSFT es el marketplace líder. El ecosistema AI (Copilot en Office, Dynamics, Teams) crea lock-in difícil de replicar.\n- **Riesgo principal:** Google Cloud ganando cuota en workloads de IA con Gemini 3.5 Flash (velocidad 4x superior según el anuncio del día). OpenAI podría reducir exclusividad con Azure si diversifica partnerships. Valuación stretched.\n- **Próximo catalizador:** Earnings Q4 FY2026 (~julio 30) con revenue de Azure AI y número de usuarios de Copilot.\n\n```\nLRCX | Lam Research | Sc.:72 | T2(72): Semis Advanced Nodes | Int.: +2 (HIGH)\n```\n- **Tesis:** Lam Research (**LRCX**) domina el segmento de etching (dry etch) y deposición química de vapor (CVD) necesarios para fabricar estructuras de 2nm. Con TSMC (**TSM**) expandiendo capacidad N2 y planificando N1.6, los pedidos de herramientas de etch aumentan proporcionalmente. Además, las memorias DRAM HBM (necesarias para los GPU clusters de NVDA/AMD) requieren herramientas de Lam para las estructuras de altísimo aspect ratio.\n- **Riesgo principal:** Similar a AMAT — ciclo de capex de semis y concentración de clientes (TSMC (**TSM**), Samsung, Micron, Hynix).\n- **Próximo catalizador:** Earnings Q4 FY2026 (~julio 2026) con guidance de memory y logic equipment orders.\n\n```\nMRVL | Marvell Technology | Sc.:72 | T1(72): AI Infra Supercycle | Int.: +2 (HIGH)\n```\n- **Tesis:** Marvell provee chips custom AI (custom ASIC/XPU) para AWS y otros hyperscalers, además de óptica de alta velocidad para interconexión de centros de datos. Con la inversión masiva en infraestructura de IA, los centros de datos necesitan interconexiones más rápidas (800G, 1.6T) donde Marvell tiene posición. Los custom silicon de Marvell para AWS Trainium/Inferentia son un driver de crecimiento secular.\n- **Riesgo principal:** Menor escala que Broadcom en silicon custom. Competencia de Broadcom, Cisco (Silicon One) en óptica/networking.\n- **Próximo catalizador:** Earnings Q2 FY2027 (~septiembre 2026) con desglose de AI revenue.\n\n```\nCRSP | CRISPR Therapeutics | Sc.:72 | T5(72): CRISPR/Gene Editing | Int.: +2 (HIGH)\n```\n- **Tesis:** CRISPR Therapeutics (**CRSP**) tiene la terapia de edición génica más avanzada comercialmente (Casgevy, aprobada para sickle cell disease y beta-talasemia). El ecosistema CRISPR en expansión (CAGR 33.5%, mercado $55B para 2034) beneficia a todos los participantes. El pipeline de CRSP incluye programas en oncología, diabetes y enfermedades cardiovasculares.\n- **Riesgo principal:** Casgevy tiene precio de $2.2M por tratamiento, creando barreras de acceso que limitan el tamaño del mercado realizable a corto plazo. Competencia de Beam (base editing más preciso) y Vertex Pharmaceuticals.\n- **Próximo catalizador:** Datos de follow-up a 2+ años de Casgevy en SCD/beta-talasemia (~H2 2026). Anuncio de nuevas indicaciones para el programa de CRISPR in vivo.\n\n```\nTSLA | Tesla Inc. | Sc.:72 | T4(72): Battery Storage Cost Revolution | Int.: +2 (HIGH)\n```\n- **Tesis:** Tesla Megapack es el producto de almacenamiento utility-scale de mayor despliegue en EEUU. Con costes de baterías cayendo 27% y el pipeline de proyectos de almacenamiento en récord de 53.8 GW, Tesla está posicionada para capturar volumen creciente. La ventaja de integración vertical (celdas 4680 + inverters + software de gestión Autobidder) da a Tesla mejores márgenes que competidores que ensamblan BMS con celdas de terceros.\n- **Riesgo principal:** FSD y robotaxi siguen siendo los drivers primarios de la tesis TSLA, y los retrasos continuos erosionan credibilidad. La competencia en Megapack (BYD, Fluence, Samsung SDI) está intensificándose. Riesgo de reputación/gestión por Elon Musk.\n- **Próximo catalizador:** Earnings Q2 2026 (~julio 23) con unidades de Megapack desplegadas y guidance de energy storage para H2.\n\n```\nSMCI | Super Micro Computer | Sc.:71 | T1(71): AI Infra Supercycle | Int.: +2 (HIGH)\n```\n- **Tesis:** SMCI provee servidores de IA (GPU clusters con cooling líquido) para los hyperscalers y colocaciones de HPC. Con Alphabet comprando $84.75B en infraestructura, la demanda de racks de GPU aumenta directamente. SMCI tiene ventaja en time-to-market por su arquitectura de Building Block Solutions que permite customización rápida.\n- **Riesgo principal:** SMCI tiene historial de issues contables (restatements en 2024). Márgenes bajo presión por competencia de Dell y HPE. Alta dependencia de NVDA para GPUs.\n- **Próximo catalizador:** Earnings FY2026 Q4 (~agosto 2026). Anuncio de contratos de liquid cooling para nuevas instalaciones de Alphabet/Meta.\n\n```\nFSLR | First Solar Inc. | Sc.:71 | T4(71): Battery Storage / Clean Energy | Int.: +2 (HIGH)\n```\n- **Tesis:** First Solar es el único fabricante de paneles solares a gran escala basado en EEUU (CdTe), con ventaja diferenciada en utility-scale por su eficiencia en condiciones de alta temperatura. Con el ciclo de despliegue acelerando (86 GW utility en 2026, de los cuales ~60 GW solar), el backlog de FSLR se beneficia directamente. La legislación de Illinois y otros estados añade demanda incremental regulatorios-driven.\n- **Riesgo principal:** Competencia de módulos chinos (aunque parcialmente protegida por aranceles). La tecnología perovskite-tandem podría superar la eficiencia CdTe en 3-5 años.\n- **Próximo catalizador:** Earnings Q2 2026 (~julio 29) con actualización de backlog y shipment guidance.\n\n```\nAMZN | Amazon.com Inc. | Sc.:71 | T1(71): AI Infra Supercycle | Int.: +2 (HIGH)\n```\n- **Tesis:** AWS es el mayor proveedor cloud mundial y beneficiario directo del gasto de AI de enterprises. El desarrollo de Trainium (chips de training) e Inferentia (chips de inferencia) representa una estrategia de diversificación de hardware que reduce dependencia de NVDA y captura más margen. El ecosistema de herramientas AI en AWS (Bedrock, SageMaker) tiene alta retención.\n- **Riesgo principal:** Competencia de Azure (Copilot integrado) y Google Cloud (Gemini 3.5 Flash). Si las empresas optan por modelos propietarios (Microsoft Copilot como bundle office), AWS pierde workloads de inferencia.\n- **Próximo catalizador:** Earnings Q2 2026 (~agosto 2026) con revenue de AWS AI y datos de adopción de Trainium.\n\n```\nORCL | Oracle Corporation | Sc.:70 | T1(70): AI Infra Supercycle | Int.: +2 (HIGH)\n```\n- **Tesis:** Oracle ha construido clusters de GPU a gran escala para IA (hasta 65,000 GPUs en una sola instalación), posicionándose como tercera cloud de elección para workloads de AI entrenamiento detrás de AWS y Azure. La base de datos autónoma y las capacidades de data residency diferenciada atraen a enterprises con requisitos regulatorios. Contratos con OpenAI, Meta y otros para infraestructura de IA son drivers concretos.\n- **Riesgo principal:** Oracle partió tarde a la cloud. La complejidad de su stack legacy (Java, licencias perpetuas) sigue siendo un peso. Competencia de los tres hyperscalers grandes que tienen ventajas de integración.\n- **Próximo catalizador:** Earnings Q1 FY2027 (~septiembre 2026) con datos de GPU cluster revenue y contratos AI.\n\n```\nENPH | Enphase Energy | Sc.:70 | T4(70): Battery Storage Cost Revolution | Int.: +2 (HIGH)\n```\n- **Tesis:** Enphase domina el mercado residencial de microinverters y baterías domésticas (IQ Battery). Con costes de almacenamiento en mínimos históricos y la aprobación de legislación de VPPs en estados clave, el pitch de \"solar + battery + grid services\" se vuelve más económico que nunca para el consumidor. El software de gestión de Enphase (Enphase Energy (**ENPH**) System) crea lock-in y revenues recurrentes.\n- **Riesgo principal:** Enphase ha sufrido desaceleración de instalaciones residenciales en 2024-2025 por altas tasas de interés y cambios en políticas de net metering en California. Competencia de Tesla Powerwall y SolarEdge.\n- **Próximo catalizador:** Earnings Q2 2026 (~julio 22) con datos de shipments de IQ Battery y guidance de instalaciones en Europa.\n\n---\n\n## 5. Empresas con score provisional < 30 (BEARISH)\n\n```\nWOLF | Wolfspeed Inc. | Sc.:29 | T4: Battery/Clean Energy (Industria SiC) | Int.: -1 (EXPOSED)\n```\n- **Por qué está bajo presión:** Wolfspeed es el principal fabricante de wafers de carburo de silicio (SiC) para aplicaciones de potencia (EVs, cargadores, inversores). Sin embargo, la empresa ha estado al borde de una reestructuración financiera: deuda significativa, quema de caja acelerada, y una demanda de SiC más débil de lo esperado debido a la desaceleración de EVs en EEUU y competencia china de precios agresivamente bajos. A pesar de que el sector de energía limpia se acelera, WOLF no puede beneficiarse si no puede sobrevivir financieramente hasta que llegue la demanda. Los fabricantes chinos de SiC (STMicro compra de China, SICC) han destruido el pricing power del sector a corto plazo.\n- **Señal de reversión:** Un anuncio de restructuración de deuda exitosa, acuerdo de suministro a largo plazo con un OEM de EVs importante (ej. GM, BMW) que garantice revenue visibility, o adquisición por parte de un actor más capitalizado (STMicro, Onsemi) cambiaría el perfil de riesgo radicalmente. Un repunte en pedidos de inversores para almacenamiento de red también sería positivo.\n\n---\n\n*Nota para el analista: INTC (Intel) tiene score de 36, técnicamente neutral, pero se encuentra en territorio de vigilancia cercana. El monopolio de TSMC (**TSM**) en 2nm, la inversión de AMD en packaging, y la profundización de la partnership NVDA-TSMC (**TSM**) confirman que Intel sigue perdiendo la carrera de IA chips. Si el score de S_analistas para INTC sigue deteriorándose en próximos días, cruzará el umbral BEARISH. El próximo catalizador relevante es el earnings de INTC (~julio 24) con update del programa 18A y Gaudi 3 adoption.*\n\n---\n\n## 6. Conflictos detectados\n\n**CONFLICTO DETECTADO — Quantum Computing (T3):**\n- Analista Técnico (score: 60): Los sistemas cuánticos actuales operan con tasas de error que limitan aplicaciones reales. \"Fault-tolerant\" se proyecta para 2029 en el mejor caso. TRL actual = 4-5 para quantum advantage comercial.\n- Analista Económico (score: 55): El IBM $10B es señal positiva pero el ROI cuántico comercial está a 3-7 años. La mayoría de \"casos de uso\" están en investigación, no producción.\n- Analista Geopolítico (score: 75): Los subsidios del DoE/DoC de EEUU y el apoyo de la UE al quantum son muy activos. Competencia China en quantum crea urgencia de inversión.\n- Analista Contrarian (score: 80): El hype cuántico puede estar justificado esta vez — IBM tiene hoja de ruta concreta con milestones técnicos verificables (diferente al hype de 2018-2021).\n\n*max(80) - min(55) = 25. No supera el umbral de 50 puntos. No se aplica flag de conflicto obligatorio. Sin embargo, la dispersión es relevante y se recomienda revisión humana del score cuántico antes de actuar.*\n\n---\n\n**NOTA DE CALIBRACIÓN — AI Infra Supercycle vs. Concentración de Capex:**\n- El analista contrarian señala que la concentración de CapEx en 3-4 hyperscalers crea un riesgo sistémico: si uno de ellos reduce guía de CapEx simultáneamente (como Meta/Google lo hicieron en 2022), el impacto en cadena en toda la supply chain sería severo. La sostenibilidad del ciclo de inversión es el riesgo sistémico principal no reflejado adecuadamente en los scores actuales.\n\n---\n\n## 7. Notas para revisión humana\n\n1. **GOOGL/GOOG duplicación en universo:** El universo contiene tanto GOOGL (Clase A) como GOOG (Clase C) de Alphabet. Ambas han sido scored idénticamente (79). Considerar colapsar a una sola fila o diferenciar si hay razón específica para mantener ambas (ej. votación en junta).\n\n2. **WOLF — verificar estado de restructuración:** El score de 29 asume que Wolfspeed sigue en situación de distress financiero. Antes de actuar sobre este BEARISH, verificar el estado actual del balance y si hay acuerdo de refinanciamiento en proceso (noticias más recientes de Q2 2026 earnings de WOLF, esperado ~agosto 2026).\n\n3. **INTC — candidato BEARISH emergente:** Con score de 36, Intel está en zona de vigilancia. El anuncio de que TSMC (**TSM**) 2nm está sold out es indirectamente bearish para INTC porque confirma que los clientes de foundry están yendo a TSMC (**TSM**), no a Intel Foundry. Próximo earnings de INTC (~julio 24) podría ser el trigger para cruzar a BEARISH si el guidance de Gaudi/18A decepciona.\n\n4. **Gemini 3.5 Flash GA:** Se mencionó que Gemini 3.5 Flash está GA (\"disponible al público general\") con velocidad 4x superior a modelos comparables. Esto podría ser un driver de adopción de Google Cloud sobre Azure/AWS en inferencia. Requiere búsqueda adicional para confirmar la fuente y la fecha exacta.\n\n5. **Quobly €115M Series A (quantum silicon):** Esta empresa no está en el universo, pero la tecnología de silicon-based quantum computing compatible con fabs existentes podría impactar a TSMC (**TSM**) (cliente de foundry) o INTC (intento de foundry services). Monitorear si alguna empresa del universo anuncia partnership con Quobly.\n\n6. **Metodología — Phase 0:** Todos los scores son UNVALIDATED y no incluyen S_técnico de Polygon (datos históricos de precio). La ausencia de validación estadística significa que los scores deben tratarse como señales directionales, no rankings absolutos. Particular cautela recomendada con las biotechs (BEAM, CRSP, BEAM) cuyas cotizaciones pueden moverse ±30% en un día por noticias clínicas.\n\n---\n\n## Fase 5 — Tabla de scores para persistencia---\n\n*Informe generado: 2026-06-08 | Phase 0 — Shadow Mode | 51 empresas scored | 5 tendencias activas con ≥2 catalizadores materiales*\n\nSources:\n- [Alphabet plans to raise $80 billion from stock

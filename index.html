    document.getElementById('content').innerHTML = marked.parse("requiere alta precisión. Pipeline activo en sickle cell, AML, hepatitis B y LDL colesterol.\n- **Riesgo principal:** Empresa pre-revenue significativa. El funding environment para biotech pre-scale sigue estrecho. La validación de Intellia no implica aprobación automática de los programas de Beam.\n- **Próximo catalizador:** Datos Phase 1/2 de BEAM-101 (sickle cell) esperados H2 2026.\n\n---\n\n```\nENPH | Enphase Energy | Sc.:75 | Tendencia: Battery Storage LCOE Record | Int.: +2 (HIGH)\n```\n- **Tesis:** La caída del LCOE de baterías a $78/MWh (-27%) reduce el payback period de instalaciones residenciales y comerciales, ampliando el mercado direccionable de microinverters y home battery systems (IQ Battery) de Enphase. El ratio solar-a-batería convergiendo a 4:1 en 2026 significa que más instalaciones solar incluyen batería, que es donde Enphase captura margin incremental sobre el hardware de inversión solo.\n- **Riesgo principal:** Enphase reportó debilidad en demand en Europa en Q4 2025 / Q1 2026. La comoditización de LFP cells puede trasladarse upstream y comprimir márgenes brutos (históricamente >40%) si los clientes priorizan precio sobre performance.\n- **Próximo catalizador:** Q2 2026 earnings (agosto) — shipment volumes y margin guidance para Q3.\n\n---\n\n```\nFSLR | First Solar Inc. | Sc.:75 | Tendencia: Battery Storage / Clean Energy | Int.: +2 (HIGH)\n```\n- **Tesis:** First Solar es el único manufacturer de thin-film solar (CdTe) a escala de utilidad en US, con 100% de manufacturing en US+India protegido por IRA domestic content adders. La aceleración de large-scale BESS deployments (87 GW utility-scale en 2025) amplía el mercado que FSLR puede servir con su pipeline de proyectos solar+storage. Backlog multi-año (>70 GW reportado) da visibilidad de revenue excepcional.\n- **Riesgo principal:** Cambios al IRA domestic content incentives (presupuesto reconciliation 2026) podrían alterar el pricing premium vs. paneles chinos importados. Perovskite tandem podría eventualmente superar la eficiencia de CdTe.\n- **Próximo catalizador:** Q2 2026 earnings (agosto) — backlog update y margin guidance. Cualquier movimiento legislativo sobre el IRA en 2026.\n\n---\n\n```\nTSLA | Tesla Inc. | Sc.:75 | Tendencia: Battery Storage LCOE Record | Int.: +2 (HIGH)\n```\n- **Tesis:** Tesla Megapack es el líder en utility-scale battery storage en US. La caída del LCOE a $78/MWh acelera proyectos utility que usan Megapack. Tesla Energy (Megapack + Powerwall) generó >$3B en revenue en FY2025 y crece más rápido que el segmento automotive, actuando como diversificador de ingresos frente a presiones en EV pricing.\n- **Riesgo principal:** Competencia de BYD/CATL en Megapack con costos más bajos (aranceles US los frenan pero no los eliminan). FSD/robotaxi timelines frecuentemente se retrasan, erosionando credibilidad en la tesis autónoma.\n- **Próximo catalizador:** Q2 2026 earnings (julio) — Tesla Energy revenue y Megapack deployments (GWh).\n\n---\n\n```\nWOLF | Wolfspeed Inc. | Sc.:75 | Tendencia: Battery Storage / EV Power | Int.: +2 (HIGH)\n```\n- **Tesis:** Silicon Carbide es la tecnología de conversión de potencia preferida para grid storage inverters y EV drivetrains por mayor eficiencia vs. silicon IGBT. La aceleración de BESS deployments (+40% en 2025) aumenta la demanda de SiC chips para inversores de grid a escala. Wolfspeed tiene contratos a largo plazo con Volkswagen, Renault y tier-1 automotive suppliers.\n- **Riesgo principal:** Alto leverage financiero. Si el ciclo de EV se desacelera o competidores (STMicro, ON Semiconductor (**ON**)) compiten en precio, los márgenes de WOLF podrían colapsar antes de breakeven en Mohawk Valley Fab. Riesgo de dilución o refinanciamiento.\n- **Próximo catalizador:** Q4 FY2026 earnings (agosto 2026) — utilización de Mohawk Valley Fab como indicador del ramp.\n\n---\n\n**Empresas BULLISH adicionales (Sc.74-77) — formato condensado:**\n\n```\nAMD | Sc.:77 | T1(77): TSMC (**TSM**) 2nm + T2(74): Agentic AI | Int.: +2 (HIGH)\nTesis: Transición MI300X/MI400 a nodos TSMC (**TSM**) avanzados mejora competitividad en AI accelerators. ROCm mejorado. Riesgo: CUDA moat de NVIDIA. Catalizador: MI400 launch H2 2026.\n\nAVGO | Sc.:77 | TSMC (**TSM**) 2nm / Custom AI Chips | Int.: +2 (HIGH)\nTesis: Diseña custom XPUs para Google (TPU) y Meta (MTIA) en proceso avanzado TSMC (**TSM**). Ramp N2P amplía capacidad para estos diseños. Catalizador: Q2 FY2026 earnings (junio).\n\nARM | Sc.:77 | TSMC (**TSM**) 2nm / AI Architecture | Int.: +2 (HIGH)\nTesis: Casi todos los chips 2nm de TSMC (**TSM**) (Apple, Qualcomm, NVIDIA) usan arquitectura ARM — royalties más altos por ASP más alto. Catalizador: Q1 FY2027 earnings (agosto).\n\nMRVL | Sc.:77 | TSMC (**TSM**) 2nm / Custom AI Silicon | Int.: +2 (HIGH)\nTesis: Custom AI silicon para AWS y Microsoft Azure en nodos avanzados TSMC (**TSM**). Beneficiario directo del ramp N2P. Catalizador: Q2 FY2027 earnings (septiembre).\n\nSMCI | Sc.:77 | Agentic AI Infrastructure | Int.: +2 (HIGH)\nTesis: Ensambla rack AI servers que ejecutan GPU clusters para agents en data center. Demanda agentic AI aumenta throughput requerido. Riesgo: governance/audit history y márgenes bajo presión.\n\nGOOGL/GOOG | Sc.:74 | T1(74): Agentic AI + T2(74): Quantum | Int.: +1 (MEDIUM)\nTesis: Gemini 2.0 es la segunda plataforma LLM más adoptada en enterprise. Google Willow quantum chip. Waymo en expansión de robotaxi. Catalizador: Google Cloud Next 2026.\n\nSNOW | Sc.:74 | Agentic AI (Data Layer) | Int.: +1 (MEDIUM)\nTesis: Cortex AI de Snowflake permite correr LLM queries directamente sobre data en Snowflake — enabler crítico para agents que necesitan contexto empresarial. Catalizador: Q2 FY2027 earnings (agosto).\n\nMDB | Sc.:74 | Agentic AI (Vector DB) | Int.: +1 (MEDIUM)\nTesis: MongoDB Atlas Vector Search es el data layer para RAG-powered agents. Catalizador: Q1 FY2027 earnings (junio).\n\nDDOG | Sc.:74 | Agentic AI (Observability) | Int.: +1 (MEDIUM)\nTesis: LLM Observability de Datadog monitorea agents en producción — cada enterprise que pone agents en prod necesita observabilidad. Catalizador: Q2 2026 earnings (agosto).\n\nNET | Sc.:74 | Agentic AI (Edge Inference) | Int.: +1 (MEDIUM)\nTesis: Workers AI de Cloudflare ejecuta inferencia LLM en edge para agents que requieren latencia baja. Catalizador: Q2 2026 earnings (agosto).\n\nSOUN | Sc.:74 | Agentic AI (Voice Interface) | Int.: +1 (MEDIUM)\nTesis: Voice AI y speech recognition de SoundHound alimenta interfaces conversacionales para automotive y restaurant AI agents. Catalizador: Q2 2026 earnings.\n\nSHOP | Sc.:74 | Agentic AI (Commerce) | Int.: +1 (MEDIUM)\nTesis: Sidekick AI de Shopify y agentic shopping experiences son un differentiator creciente para merchants. Catalizador: Q2 2026 earnings (julio).\n\nAMZN | Sc.:74 | T1(74): Agentic AI + T2(68): Quantum | Int.: +1 (MEDIUM)\nTesis: AWS Bedrock + Amazon Q es la plataforma #1 de AI cloud por market share. Trainium2 para training, Inferentia para inference. Catalizador: AWS re:Invent (nov/dic 2026).\n\nAMAT | Sc.:77 | TSMC (**TSM**) 2nm Equipment | Int.: +2 (HIGH)\nTesis: Equipment de deposición y CVD para Fab 18B de TSMC (**TSM**). Beneficiario directo de cada wafer start en N2/N2P. Catalizador: Q2 FY2026 earnings (agosto).\n\nLRCX | Sc.:77 | TSMC (**TSM**) 2nm Equipment | Int.: +2 (HIGH)\nTesis: Equipment de etch y ALD para nodos avanzados de TSMC (**TSM**). Idéntico perfil de exposición a AMAT. Catalizador: Q2 FY2026 earnings (julio).\n```\n\n---\n\n## 5. Empresas con score provisional < 30 (BEARISH)\n\nSin novedades hoy. No se identificaron empresas del universo con score provisional inferior a 30. La única empresa con exposición negativa material es **INTC** (score 61, NEUTRAL, intensidad -2 THREATENED): el éxito de TSMC (**TSM**) N2P amplía la brecha tecnológica con Intel 18A, pero el modelo no genera score <30 porque Intel tiene negocios independientes (AI PC, Gaudi) que mitigan parcialmente el impacto.\n\n---\n\n## 6. Conflictos detectados\n\nSin conflictos detectados. Ninguna tendencia activa presentó diferencia max(scores)-min(scores) > 50 puntos entre los cuatro analistas.\n\nLa tensión más alta registrada corresponde a **TSMC (**TSM**) 2nm / Advanced Semiconductors**:\n- Analista Técnico: 85 (yield >70%, N2P en ramp, roadmap ejecutándose punto a punto)\n- Analista Geopolítico: 55 (riesgo Taiwan Strait; restricciones EUV a China comprimen mercado total)\n- Diferencia: 30 puntos — por debajo del umbral de 50. Scoring normal sin flag.\n\n---\n\n## 7. Notas para revisión humana\n\n1. **IBM Quantum Advantage demo H2 2026 — evento de calendario**: IBM comprometió demostrar quantum advantage este año. Recomendar crear nota de seguimiento explícita. El criterio de evaluación es crítico: \"problema industrialmente relevante\" (optimization de supply chain real, simulación molecular con impacto en drug discovery verificable) vs. \"benchmark sintético construido para el hardware de IBM\". La distinción determina si IBM, IONQ y RGTI experimentan re-rating de múltiplos o si el mercado lo descuenta como marketing. Seguimiento activo en sesiones de Q3 2026.\n\n2. **Intellia (NTLA) no está en el universo**: La empresa que podría lograr la primera aprobación FDA de terapia in vivo CRISPR (lonvo-z, BLA rolling activo, decisión H1 2027) no está entre las 51 empresas del universo. El impacto secundario en CRSP y BEAM ya está capturado en los scores, pero considerar agregar NTLA o crear una nota de watch explícita dado que la aprobación de lonvo-z sería un evento de sector que elevaría todos los scores de gene editing en el universo.\n\n3. **INTC watch — reversal catalyst**: Intel está en posición THREATENED (score 61) por el éxito de TSMC (**TSM**) N2P. Sin embargo, si Intel anuncia en H2 2026 un cliente externo relevante para IFS (Intel Foundry Services) adoptando el proceso 18A — especialmente si es un hyperscaler o un fab-less relevante — el score revertiría a NEUTRAL o BULLISH rápidamente. Monitorear activamente cualquier comunicado de IFS sobre clientes productivos en 18A.\n\n4. **WOLF riesgo financiero no capturado en modelo**: Score de mercado es 75 (BULLISH) por el LCOE record de baterías y demanda de SiC. Sin embargo, Wolfspeed tiene alto leverage financiero y riesgo de refinanciamiento que el modelo actual no penaliza explícitamente. Antes de cualquier consideración de posición en WOLF, verificar balance sheet actualizado: deuda neta, covenant compliance, y cash runway post-capex de Mohawk Valley Fab. El score técnico-mercado de 75 puede sobreestimar la calidad del crédito subyacente.\n\n5. **Battery Storage márgenes vs. volumen**: El LCOE record ($78/MWh) es positivo para deployers y negativamente ambiguo para manufacturers. ENPH y FSLR tienen estructuras de costos diferentes: FSLR más protegida por IRA y diferenciación de CdTe thin-film; ENPH más expuesta a comoditización si la presión de precios sube por la cadena. Recomendar vigilar márgenes brutos en Q2 2026 earnings de ambas empresas (agosto) antes de ajustar scores.\n\n6. **A2A Protocol v1.0 como upside no modelado**: La adopción del Agent-to-Agent protocol bajo Linux Foundation es una variable de aceleración que no está capturada en los scores actuales de CRM (88), NOW (86), PATH (80), PLTR (80). Si la interoperabilidad de agents reduce el freno de vendor lock-in percibido por CIOs, la velocidad de adoption podría superar las tasas modeladas. Flagear como upside no modelado — los scores podrían ser conservadores si A2A acelera el mercado en H2 2026.\n\n------\n\nSources:\n- [IBM $10B Quantum Computing Commitment](https://newsroom.ibm.com/2026-06-02-ibm-commits-more-than-10-billion-to-quantum-computing,-funding-its-roadmap-from-todays-leading-systems-to-the-worlds-first-fault-tolerant-quantum-computers)\n- [DOC $2B Quantum Letters of Intent — NIST](https://www.nist.gov/news-events/news/2026/05/department-commerce-announces-letters-intent-9-companies-2-billion)\n- [TSMC (**TSM**) 2nm Yield Rates Surge in 2026](https://heqingele.com/blog/tsmc-2nm-yield-rates-mass-production-status-2026/)\n- [TSMC (**TSM**) Officially Enters 2nm Mass Production](https://markets.financialcontent.com/wral/article/tokenring-2026-1-7-tsmc-officially-enters-2nm-mass-production-apple-and-nvidia-lead-the-charge-into-the-gaa-era)\n- [Salesforce Agentforce $800M ARR — FY2026 Q4 Results](https://investor.salesforce.com/news/news-details/2026/Salesforce-Delivers-Record-Fourth-Quarter-Fiscal-2026-Results/default.aspx)\n- [ServiceNow and Accenture Forward Deployed Engineering Program](https://newsroom.servicenow.com/press-releases/details/2026/ServiceNow-and-Accenture-launch-forward-deployed-engineering-program-to-scale-agentic-AI-across-the-enterprise/default.aspx)\n- [Battery Storage Costs Hit Record Lows — BloombergNEF](https://about.bnef.com/insights/clean-energy/battery-storage-costs-hit-record-lows-as-costs-of-other-clean-power-technologies-increased-bloombergnef/)\n- [IEA: 108 GW Battery Storage Additions in 2025](https://solarquarter.com/2026/06/01/iea-reports-record-108-gw-of-global-battery-storage-additions-in-2025/)\n- [Intellia Phase 3 CRISPR HAE Results](https://ir.intelliatx.com/news-releases/news-release-details/intellia-therapeutics-reports-positive-phase-3-results)\n- [Intellia BLA Rolling Submission to FDA](https://ir.intelliatx.com/news-releases/news-release-details/intellia-therapeutics-initiates-rolling-submission-biologics)\n- [Photonic Chip Breakthrough — ScienceDaily](https://www.sciencedaily.com/releases/2026/06/260601025343.htm)\n- [Agentic AI Enterprise Market $9B Analysis](https://tech-insider.org/agentic-ai-enterprise-2026-market-analysis/)");

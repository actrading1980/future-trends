    document.getElementById('content').innerHTML = marked.parse("El informe ha sido generado y guardado. Aquí está el output completo:\n\n---\n\n```\nVALIDATION_STATUS: UNVALIDATED\nLos scores en este informe no han superado el gate estadístico de Phase 2.\nNo usar para decisiones de tamaño de posición.\n```\n\n## 1. Executive Summary\n\nLa jornada del 23 de junio de 2026 estuvo dominada por tres vectores simultáneos: (1) aceleración del duopolio TSMC (**TSM**) en nodos avanzados (cinco fabs en ramp-up 2nm, corte >25% en 28nm legacy), (2) confluencia de hitos cuánticos materiales —Microsoft Majorana 2 + IonQ/Duke tripartite entanglement (3 nodos, 84-88% fidelidad) + IBM $10B pledge— que consolida quantum como categoría institucional real, y (3) el programa chino de $295B con mandato 80% doméstico que reescribe el TAM de NVIDIA/AMD en su mayor mercado emergente. La M&A más significativa del segmento: Qualcomm negocia adquisición de Tenstorrent por $8-10B. Trece empresas del universo alcanzan score provisional > 70.\n\n---\n\n## 2. Desarrollos Clave del Día\n\n**[DESARROLLO 1] Qualcomm negocia adquisición de Tenstorrent por $8-10B**\n\n- **Qué pasó:** Reuters reportó el 16 de junio que Qualcomm (QCOM) está en negociaciones avanzadas para adquirir Tenstorrent —startup de chips AI de Jim Keller— en un deal de $8B-$10B. Ambas partes declinaron comentar.\n- **Por qué importa:** Tenstorrent diseña AI accelerators en arquitectura RISC-V open-source, competitiva con NVIDIA y AMD. Para Qualcomm (hoy limitado a edge AI/Snapdragon), esta adquisición representaría el salto directo a infraestructura de data center AI —un mercado de $416B donde Qualcomm tiene penetración casi nula.\n- **Implicación de inversión:** QCOM es el beneficiario directo. NVDA y AMD enfrentan un competidor nuevo con respaldo financiero masivo y el IP humano de Jim Keller. ARM Holdings sufre presión estructural si el ecosistema RISC-V recibe el respaldo de distribución de Qualcomm.\n- **Qué vigilar:** Anuncio oficial de cierre del deal (estimado Q3 2026). Posible intervención antimonopolio del DOJ/FTC. Earnings QCOM julio 2026 con cualquier referencia a M&A en la call.\n\n---\n\n**[DESARROLLO 2] China lanza programa de $295B con mandato 80% doméstico — excluye NVIDIA y AMD**\n\n- **Qué pasó:** El 22 de junio de 2026, China reveló un programa quinquenal de 2T yuan (~$295B) para interconectar miles de data centers en una red nacional de cómputo. El mandato exige que ≥80% de la tecnología provenga de proveedores chinos.\n- **Por qué importa:** El mayor programa de compras de infraestructura de cómputo en la historia elimina a NVIDIA, AMD y SMCI de los contratos públicos más grandes de la próxima década. China representa ~15-17% del mercado global de data center AI.\n- **Implicación de inversión:** Impacto negativo estructural y permanente (no cíclico) para NVDA (mayor exposición), AMD y SMCI. Los beneficiarios locales son Huawei Ascend y Biren —ninguno en el universo.\n- **Qué vigilar:** Publicación oficial del programa con detalles de enforcement. Guidance de NVIDIA Q2 FY2027 (agosto 2026) sobre revenue China. Posible producto \"degradado\" tipo H20 que pueda calificar como tecnología permitida.\n\n---\n\n**[DESARROLLO 3] Microsoft Majorana 2 — vida de qubits topológicos >20 segundos, 1000x mejora**\n\n- **Qué pasó:** En Microsoft Build 2026 (2 de junio), Microsoft unveiló Majorana 2 con un cambio de aluminio a plomo como superconductor, duplicando el gap topológico (~30→70 µeV) y extendiendo la vida del qubit de milisegundos a >20 segundos (con registros de hasta 1 minuto).\n- **Por qué importa:** La coherencia del qubit es el obstáculo #1 en quantum fault-tolerant. Cada orden de magnitud de mejora reduce exponencialmente el overhead de corrección de errores. Majorana 2 diferencia técnicamente a Microsoft con una arquitectura topológica que IBM y IonQ no tienen.\n- **Implicación de inversión:** Catalizador de credibilidad para el segmento entero (beneficia IBM y IonQ también). Azure Quantum como plataforma recibe un argumento comercial renovado.\n- **Qué vigilar:** Publicación peer-reviewed (antecedente: Majorana 1 fue retractado parcialmente en 2025 por Science). Anuncio de primer enterprise customer en Azure Quantum con hardware Majorana 2.\n\n---\n\n**[DESARROLLO 4] IonQ + Duke University: Tripartite Entanglement en red cuántica de 3 nodos (84-88% fidelidad)**\n\n- **Qué pasó:** El 20-21 de junio, Duke University e IonQ publicaron la primera demostración de entrelazamiento tripartito distribuido (estado GHZ) a través de una red cuántica de 3 nodos, con fidelidad 84.1-88.1%, sin post-selección. Violó la desigualdad de Mermin, confirmando no-localidad cuántica con memorias atómicas individualmente direccionables.\n- **Por qué importa:** Es la transición de \"computadora cuántica aislada\" a \"red cuántica modular\". Una red de 3 nodos verificada es el building block de computadoras cuánticas distribuidas que escalan más allá de los límites físicos de un solo chip.\n- **Implicación de inversión:** Catalizador directo para IONQ (puro play, además seleccionado para DARPA HARQ el mismo mes). Eleva credibilidad de IBM Quantum y el sector completo.\n- **Qué vigilar:** Publicación formal en Physical Review Letters/Nature Physics. Anuncio de demo pública en escala 4+ nodos. Q2 2026 earnings IonQ (agosto) con ARR guidance post-hito.\n\n---\n\n**[DESARROLLO 5] TSMC (**TSM**) corta producción 28nm >25% mientras rampea 5 fabs 2nm simultáneamente**\n\n- **Qué pasó:** TrendForce reportó el 22 de junio que TSMC (**TSM**) redujo wafer starts mensuales en Fab 15A (28nm) más del 25% desde principios de 2026, mientras cinco fabs rampeando 2nm deben escalar de ~50,000 a 100,000-140,000 wafers/mes para fin de año. Apple tiene comprometido >50% de toda la capacidad 2nm de 2026.\n- **Por qué importa:** Señal de polarización extrema del mix: los clientes de advanced nodes (AI chips, Apple Silicon) saturan capacidad, los de nodos maduros (industrial, IoT) pierden prioridad. Beneficia todo el ecosistema de equipamiento EUV/advanced nodes y a los fabless con acceso garantizado a 2nm.\n- **Implicación de inversión:** Bullish para TSM, AAPL, ASML, AMAT, LRCX, ARM. Neutral-negativo para INTC (su propia foundry 18A compite en desventaja de escala).\n- **Qué vigilar:** Pricing de wafers N2 (actualmente ~$30,000/wafer). Yield rates en nuevas fabs tras 6 meses de volumen. Guidance capex TSMC (**TSM**) Q2 2026 earnings (julio).\n\n---\n\n## 3. Tendencias Emergentes Nuevas Detectadas Hoy\n\n**\"Quantum Networking Stack\" como categoría de inversión diferenciada:** La convergencia del hito IonQ/Duke (3 nodos), Majorana 2 (coherencia 20s), IBM $10B y DARPA HARQ señala que 2026 marca el paso de \"quantum computing individual\" a \"quantum networking infrastructure\". Similar a la transición de mainframes individuales a internet. Horizonte comercial: 2029-2033, pero el mercado financiero comenzará a valorar plataformas de networking cuántico (no solo qubit counts) como activo estratégico en los próximos 6-12 meses.\n\n**Consolidación M&A en AI Hardware fuera del ecosistema NVIDIA:** El posible deal QCOM-Tenstorrent sigue al patrón de Amazon (Trainium), Google (TPU v5), Microsoft (Maia 2), Meta (MTIA). El mercado de AI hardware está transitando de \"NVIDIA or nothing\" a un ecosistema fragmentado. Presión secular sobre el pricing power de NVIDIA en data center, aunque en 12-18 meses sigue sin rival creíble en escala.\n\n---\n\n## 4. Empresas con Score Provisional > 70 (BULLISH)\n\n```\nTSM | TSMC | Sc.:84 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +3 (CORE)\n```\n- **Tesis:** TSMC (**TSM**) es el único proveedor global capaz de fabricar chips a 2nm en escala. Apple garantiza >50% de la capacidad 2026, cinco fabs en ramp simultáneo, y la demanda de AI polariza el mix hacia advanced nodes maximizando pricing power histórico. El corte del 25%+ en 28nm confirma que TSMC (**TSM**) apostó todo al advanced node migration.\n- **Riesgo principal:** Geopolítico Taiwan. Ramp de 5 fabs simultáneo eleva riesgo de yield issues sistémicos si el proceso EUV falla en alguna fab.\n- **Próximo catalizador:** Q2 2026 earnings TSMC (**TSM**) (finales de julio) con guidance de capex Arizona Fab 21 Phase 2 y yield update N2.\n\n```\nAAPL | Apple Inc. | Sc.:80 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +2 (HIGH)\n```\n- **Tesis:** Apple es el cliente ancla que garantiza la viabilidad del ramp 2nm: >50% de toda la capacidad 2026 va a Apple Silicon. iPhone 18 (sep 2026) con A18 en 2nm + Apple Intelligence 3.0 crea el moat de silicio+software más fuerte del sector consumer para los próximos 24 meses.\n- **Riesgo principal:** Demanda iPhone en China donde compite directamente con Huawei. Si iPhone 18 decepciona en unidades, la ventaja de 2nm no se traduce a earnings.\n- **Próximo catalizador:** Confirmación de specs iPhone 18 con A18 2nm (septiembre 2026). WWDC follow-ups de Apple Intelligence (julio 2026).\n\n```\nQCOM | Qualcomm Inc. | Sc.:78 | T1(78): M&A Tenstorrent + T4(70): TSMC (**TSM**) 2nm Ramp | Int.: +3 (CORE)\n```\n- **Tesis:** Si el deal Tenstorrent cierra, Qualcomm pasa de edge AI a competidor sistémico de NVIDIA con suite completa: edge (Snapdragon) + server (Tenstorrent RISC-V). El IP de Jim Keller combinado con acceso a TSMC (**TSM**) 2nm crearía una plataforma difícil de ignorar para hyperscalers que buscan alternativas a NVIDIA.\n- **Riesgo principal:** Deal puede no cerrarse. Riesgo de integración post-cierre (culturas muy distintas). Tenstorrent podría preferir IPO independiente.\n- **Próximo catalizador:** Anuncio oficial de deal (estimado Q3 2026). Earnings QCOM julio con cualquier referencia a M&A.\n\n```\nASML | ASML Holding | Sc.:76 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +2 (HIGH)\n```\n- **Tesis:** ASML es el monopolio de equipamiento EUV y el único proveedor de High-NA EUV para nodos sub-2nm. Con 5 fabs TSMC (**TSM**) rampando simultáneamente, el order backlog está completamente lleno para 2026-2027. Cada entrega de High-NA EUV = ~€350M de revenue por unidad.\n- **Riesgo principal:** Restricciones de exportación a China ya impactan (EUV bloqueado). Ampliación de restricciones a ArFi immersion afectaría backlog restante en China.\n- **Próximo catalizador:** Q2 2026 earnings ASML (julio). Primera entrega confirmada de High-NA EUV a TSMC (**TSM**)/Intel.\n\n```\nAMAT | Applied Materials | Sc.:76 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +2 (HIGH)\n```\n- **Tesis:** AMAT provee sistemas de deposición y etch críticos para cada nueva fab. El ramp de 5 fabs 2nm es un catalizador de revenue directo: cada fab requiere decenas de sistemas con precio unitario $5M-$50M. Diversificación en HBM para AI añade fuente adicional de crecimiento.\n- **Riesgo principal:** Alta concentración en TSMC (**TSM**) (~20%+ revenue). Restricciones de exportación a China ya eliminaron ~$2B de revenue en 2025.\n- **Próximo catalizador:** Q2 FY2026 earnings AMAT (agosto). Guidance orders gate-all-around y 2nm equipment.\n\n```\nNVDA | NVIDIA Corporation | Sc.:76 | T1(56): M&A Tenstorrent + T4(76): TSMC (**TSM**) 2nm Ramp | Int.: +2 (HIGH)\n```\n- **Tesis:** Blackwell B200 y Rubin Next-Gen dependen exclusivamente de TSMC (**TSM**) advanced nodes. El ecosistema CUDA —decenas de miles de modelos, frameworks, librerías— crea un moat de software que ningún competidor puede igualar en 12-18 meses. Demanda de AI inference en máximos de 52 semanas.\n- **Riesgo principal:** China $295B con mandato 80% doméstico elimina efectivamente ~15-17% del mercado global de data center AI para NVIDIA. Este riesgo está subestimado en el precio actual.\n- **Próximo catalizador:** Q2 FY2027 earnings NVDA (agosto 2026) con guidance China post-mandato. Lanzamiento Rubin GPU (H1 2027).\n\n```\nIBM | IBM Corporation | Sc.:74 | Tendencia: Quantum Computing | Int.: +3 (CORE)\n```\n- **Tesis:** $10B comprometidos para 5 años, objetivo Starling (fault-tolerant) 2029,  score es más beta cuántico que alpha individual.\n- **Próximo catalizador:** Anuncio de colaboración con hyperscaler o gobierno. Q2 2026 earnings (agosto).\n\n```\nFSLR | First Solar Inc. | Sc.:74 | Tendencia: Clean Energy 86 GW Surge | Int.: +3 (CORE)\n```\n- **Tesis:** Único fabricante de paneles solares inmune a riesgo arancelario (manufactura 100% US/aliados), beneficiado por crédito 45X del IRA (~MD_JSON.17/watt). Backlog de 47.9 GW a entregar hasta 2030 proporciona visibilidad de revenue excepcional. Illinois CRGA (1 junio) + 43.4 GW de solar utility-scale planificados para 2026 (+60% vs 2025) crean entorno de demanda record.\n- **Riesgo principal:** Dilución del IRA 45X por reforma fiscal del Congreso US. Si tarifas sobre paneles chinos se relajan, ventaja de costo se reduce.\n- **Próximo catalizador:** Q2 2026 earnings FSLR (julio/agosto). Clarificación legislativa sobre crédito 45X en paquete de reconciliación fiscal.\n\n```\nARM | Arm Holdings | Sc.:72 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +2 (HIGH)\n```\n- **Tesis:** ARM arquitectura es la base de los chips 2nm más importantes: Apple A18, Snapdragon 8 Elite 2, múltiples AI accelerators custom. Cada wafer de 2nm para estos clientes paga royalties a ARM. Con 5 fabs TSMC (**TSM**) rampando, ARM captura royalties crecientes sin incrementar capex propio.\n- **Riesgo principal:** Deal QCOM-Tenstorrent introduce riesgo estructural: si Qualcomm migra data center AI a RISC-V (libre de royalties), ARM pierde un cliente de alto valor en el segmento de mayor crecimiento. Es el risk contrarian más relevante de la sesión para ARM.\n- **Próximo catalizador:** Evolución del deal QCOM-Tenstorrent. Q1 FY2027 earnings ARM (julio) con royalty guidance por segmento.\n\n```\nLRCX | Lam Research | Sc.:70 | Tendencia: Advanced Semiconductors 2nm Ramp | Int.: +1 (MEDIUM)\n```\n- **Tesis:** Lam provee sistemas de etch y ALD indispensables para gate-all-around transistors en 2nm. El ramp de TSMC (**TSM**) y la demanda de más capas en HBM3e para AI crean demanda estructural. Revenue de memory (HBM) compensa debilidad en NAND convencional.\n- **Riesgo principal:** Restricciones de exportación a China siguen siendo el mayor headwind. Si el programa chino de $295B financia clientes domésticos que comprarían a SMIC (no puede usar herramientas US), parte del TAM de LRCX en China desaparece definitivamente.\n- **Próximo catalizador:** Q4 FY2026 earnings Lam (julio). Order book 2nm gate-all-around vs legacy nodes.\n\n```\nAMD | Advanced Micro Devices | Sc.:70 | T1(58): M&A Tenstorrent + T4(70): TSMC (**TSM**) 2nm Ramp | Int.: +1 (MEDIUM)\n```\n- **Tesis:** AMD se beneficia del ramp TSMC (**TSM**) 2nm/3nm para MI400 e EPYC Genoa 2. Sigue siendo la única alternativa seria a NVIDIA para AI training en HPC con market share en expansión vs Intel. El moat de software ROCm mejora lentamente pero avanza.\n- **Riesgo principal:** Deal QCOM-Tenstorrent añade competidor creíble en AI hardware. China $295B cierra ~10-15% de TAM de AI accelerators. Márgenes bajo presión si ROCm no logra paridad con CUDA.\n- **Próximo catalizador:** Q2 2026 earnings AMD (julio/agosto) con guidance MI400 shipments y comentario sobre China revenue.\n\n---\n\n## 5. Empresas con Score Provisional < 30 (BEARISH)\n\nSin novedades hoy. No se identificaron empresas del universo con score < 30 en esta sesión. El catalizador negativo más fuerte —China $295B mandato doméstico— impacta a NVDA, AMD y SMCI, pero la fortaleza del vector semiconductores avanzados neutraliza el score neto de estas empresas. ENPH (60) e INTC (62) quedan en zona NEUTRAL con vigilancia activa.\n\n---\n\n## 6. Conflictos Detectados\n\n**Conflicto parcial — NVDA: Bull case TSMC (**TSM**) 2nm vs Bear case China mandato $295B**\n- Score NVDA T4 (TSMC (**TSM**) 2nm beneficiario): 76\n- Score NVDA T2 (China mandato, disruption): 45\n- Diferencia: 31 puntos (no activa flag automático, umbral = 50)\n- Nota cualitativa: Los dos riesgos tienen naturaleza opuesta y horizontes distintos. El beneficio de 2nm es de ventaja competitiva relativa a 12-18 meses; el perjuicio de China es estructural y permanente a 5+ años. Se recomienda monitorizar ambas variables de forma independiente. Si revenue guidance de China en Q2 FY2027 earnings (agosto) confirma impacto > 10% de ingresos totales, revisar score NVDA a la baja.\n\n**Riesgo estructural no modelado — ARM: Amenaza RISC-V (deal QCOM-Tenstorrent)**\n- Score ARM en sesión: 72 (basado en beneficio de ramp 2nm como proveedor de arquitectura)\n- Si deal QCOM-Tenstorrent cierra oficialmente: RISC-V recibe respaldo financiero y de distribución masivo, amenazando los royalties de ARM en data center AI (el segmento de mayor crecimiento). Este riesgo no está modelado en el score actual porque el deal no se ha confirmado.\n- Acción: Si el deal se confirma, revisar intensidad ARM a 0 o -1 en tendencia AI Hardware y recalcular.\n\n---\n\n## 7. Notas para Revisión Humana\n\n1. **QCOM/Tenstorrent**: Monitorizar activamente. Cierre del deal → score QCOM a 85+. Ruptura → score de vuelta a ~58.\n\n2. **China $295B mandato doméstico**: Programa aún en \"drafting\" (no ley). Cuando se oficialice, cuantificar impacto en revenue NVDA China (estimado $5-8B en FY2026). Verificar si NVIDIA negocia producto degradado tipo H20 como excepción.\n\n3. **Microsoft Majorana 2 / validación científica**: Score de MSFT quantum contingente a publicación peer-reviewed (60-90 días). Antecedente de Majorana 1 (parcialmente retractado en 2025) crea riesgo de credibilidad.\n\n4. **ENPH**: US residential sell-through cayó 48% en Q1 2026 por expiración del crédito 25D. Si Q2 2026 earnings (julio) muestran profundización de caída sin compensación commercial, revisar hacia BEARISH.\n\n5. **IonQ Q2 earnings (agosto 2026)**: Con hito de tripartite entanglement + DARPA HARQ, el mercado esperará aceleración de ARR. Si ARR anualizado se mantiene bajo $30M, el momentum técnico no se traduce en financiero.\n\n6. **Biotech/CRISPR**: DNA-guided CRISPR (Hong Kong) es técnicamente relevante pero no alcanzó el umbral de 2 catalizadores materiales para scoring. CRSP, BEAM, MRNA se mantienen en NEUTRAL (52, 52, 50) hasta catalizador regulatorio, M&A, o earnings con guidance change.\n\n7. **Illinois CRGA**: Monitorizar contratos FSLR >1 GW en Illinois como catalizador adicional.\n\n------\n\n**Informe guardado en** `reports/20260623.md`.\n\n**Resumen de la sesión:** 5 tendencias con ≥2 catalizadores materiales (AI Hardware M&A, China Chip Mandate, Quantum Computing, Semiconductores 2nm, Clean Energy); 13 empresas con score > 70 (BULLISH/STRONG_BULLISH); 0 empresas con score < 30; 51 empresas scoradas en el CSV de persistencia.\n\nSources:\n- [Qualcomm in Talks to Acquire Tenstorrent for $8-10B — The Register](https://www.theregister.com/systems/2026/06/16/qualcomm-said-to-be-circling-ai-chip-biz-tenstorrent-in-10b-risc-v-power-play/5256084)\n- [China AI Data Center Grid — $295B Domestic Mandate — TechTimes](https://www.techtimes.com/articles/318868/20260622/china-ai-data-center-grid-locks-out-nvidia-295-billion-domestic-chip-mandate.htm)\n- [IBM Commits $10B to Quantum Computing — IBM Newsroom](https://newsroom.ibm.com/2026-06-02-ibm-commits-more-than-10-billion-to-quantum-computing,-funding-its-roadmap-from-todays-leading-systems-to-the-worlds-first-fault-tolerant-quantum-computers)\n- [IonQ/Duke University Tripartite Entanglement — TechTimes](https://www.techtimes.com/articles/318795/20260621/quantum-networking-clears-three-node-barrier-duke-ionq-entangle-trapped-ions.htm)\n- [Microsoft Majorana 2 Quantum Chip — HPCwire](https://www.hpcwire.com/off-the-wire/microsoft-unveils-majorana-2-quantum-chip-targets-commercial-scale-quantum-computing-by-2029/)\n- [TSMC (**TSM**) Cuts 28nm Output 25%+ — TrendForce](https://www.trendforce.com/news/2026/06/22/news-tsmc-reportedly-cuts-28nm-output-by-over-25-since-early-2026-as-advanced-node-push-accelerates/)\n- [TSMC (**TSM**) 2nm Ramp — StreetStocker](ht

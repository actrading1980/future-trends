US (thin-film CdTe), sin exposición a supply chain China. NextEnergy $974M raise para utility-scale solar va exactamente al TAM de FSLR. Contratos PPA con AI data centers son el siguiente catalizador.\n- Riesgo principal: Perovskite tandem puede superar la eficiencia de thin-film CdTe a mediano plazo. Dependencia de IRA credits que puede revertirse.\n- Próximo catalizador: Q2 2026 earnings. Anuncio de contratos PPA con data centers.\n```\n\n```\nWOLF | Wolfspeed Inc. | Sc.:72 | T5(72): Battery Storage & Clean Energy Policy Acceleration | Int.: +2 (HIGH)\n- Tesis: Silicon carbide (SiC) es el semiconductor clave para power conversion en EVs, cargadores rápidos y baterías de grid — exactamente el stack que crece con la electrificación de la red.\n- Riesgo principal: Wolfspeed tiene historial de problemas de manufactura y cash burn. Competencia de STMicroelectronics y Onsemi en SiC.\n- Próximo catalizador: Q4 FY2026 earnings (agosto). Capacidad planta Mohawk Valley. Anuncio refinanciamiento de deuda.\n```\n\n---\n\n## 5. Empresas con score provisional < 30 (BEARISH)\n\nSin novedades hoy. No se identificaron empresas del universo con score provisional < 30 en las últimas 48 horas. El sesgo general del mercado es fuertemente BULLISH para el sector tech con los catalizadores actuales. La única nota negativa de fondo es **Intel (INTC, score 58, NEUTRAL)** que continúa perdiendo posición relativa en el ecosistema de foundry avanzado frente a TSMC (**TSM**) y Samsung — pero no hay catalizador negativo específico de las últimas 48h que justifique un score BEARISH.\n\n---\n\n## 6. Conflictos detectados\n\n**[CONFLICTO DETECTADO: Quantum Computing — Hype vs Realidad Técnica (alerta de watchlist)]**\n- Analista Técnico: 55 (TRL 4-5, pre-commercial, coherence times mejorando pero insuficientes para aplicaciones generales)\n- Analista Económico: 65 (TAM enorme a largo plazo, IBM credibiliza con $10B)\n- Analista Geopolítico: 60 (US-China competition en quantum, National Quantum Initiative activa)\n- Analista Contrarian: 40 (quantum computing en \"Trough of Disillusionment\" Gartner — la inversión de IBM puede reinflarlo artificialmente sin cambiar el timeline técnico real)\n- Max-min = 65-40 = 25 → No supera el umbral de 50 para CONFLICTO FORMAL, pero la brecha merece atención.\n- **Alerta específica:** El riesgo real es que el $10B de IBM crea narrativa de urgencia en inversores que no refleja el timeline técnico. Las empresas pure-play (IONQ, RGTI) tienen upside especulativo significativo pero también riesgo de dilución o irrelevancia antes del quantum advantage comercial. El score de 78 para IONQ/RGTI refleja el valor especulativo + M&A optionality, no un caso de adopción inminente.\n\n**[NOTA DE DILUCIÓN: Alphabet $84.75B — Tensión entre capex justificado y dilución EPS]**\n- El capital raise es estructuralmente bullish para el ecosistema (NVDA, SMCI, ARM, MRVL) pero crea tensión para GOOGL/GOOG directamente:\n  - Dilución potencial: $15B en common stock + $40B ATM = hasta $55B en dilución potencial ≈ 4.5% sobre las shares actuales.\n  - Score de GOOGL/GOOG mantiene en 89 (STRONG_BULLISH) por la dominancia del catalizador de demanda — pero con alerta de que la dilución puede crear volatilidad en el EPS de Q3-Q4 2026.\n\n---\n\n## 7. Notas para revisión humana\n\n**[1. Validar: ByteDance $14B en NVIDIA — impacto de export controls]**\nLa cifra de $14B en chips NVIDIA para ByteDance en 2026 requiere validación manual: ¿corresponde a chips H100/H200 ya en el pipeline, o incluye Blackwell? Las restricciones de exportación de BIS pueden cambiar el perfil de esta compra. Si ByteDance queda restringida a chips de menor capacidad, el impacto en NVDA revenue puede ser menor al anticipado.\n- **Acción sugerida:** Verificar reportajes de Reuters/Bloomberg sobre export license status de ByteDance.\n\n**[2. Candidata a inclusión en el universo: Intellia Therapeutics (NTLA)]**\nIntellia (NTLA) no está en companies.json pero es el catalizador del día en
